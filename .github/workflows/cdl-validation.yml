name: CDL Validation Pipeline

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      validation_mode:
        description: 'Validation mode'
        required: true
        default: 'derived'
        type: choice
        options:
          - derived
          - full

  # Scheduled trigger (optional - uncomment and adjust as needed)
  # schedule:
  #   - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC

  # Trigger on CDL file changes (if stored in repo)
  # push:
  #   paths:
  #     - 'subscription_transaction_fct.xlsx'
  #     - 'bq_reconciliation/source_data/**'

jobs:
  validate-cdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r bq_reconciliation/requirements.txt

      # ============================================================================
      # DATA SOURCE OPTIONS - Choose one:
      # ============================================================================

      # Option 1: Use local CSV files (default)
      # Requires: CSV files committed to repo or downloaded from storage
      # - Pros: Fast, no BigQuery costs, works offline
      # - Cons: Requires manual data exports, data may be stale

      # TODO: Uncomment if using CSV files from GCS
      # - name: Download source data from GCS
      #   run: |
      #     gsutil -m cp -r gs://your-bucket/source_data bq_reconciliation/
      #     gsutil cp gs://your-bucket/subscription_transaction_fct.xlsx .
      #   env:
      #     GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

      # Option 2: Connect to BigQuery directly (recommended for production)
      # Requires: GCP authentication configured
      # - Pros: Always fresh data, no export step, date range filtering
      # - Cons: Small BigQuery costs (~$0.01-0.10 per run)

      # TODO: Uncomment to enable BigQuery mode with Workload Identity
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_NAME/providers/PROVIDER_NAME'
      #     service_account: 'cdl-validator@ncau-data-newsquery-prd.iam.gserviceaccount.com'

      # OR: Uncomment to enable BigQuery mode with service account key
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # ============================================================================
      # VALIDATION STEPS
      # ============================================================================

      # CSV Mode (default)
      - name: Run CDL validation (derived metrics)
        if: ${{ github.event.inputs.validation_mode == 'derived' || github.event.inputs.validation_mode == '' }}
        id: validation_derived
        working-directory: bq_reconciliation
        run: |
          python validate_from_source.py \
            --cdl ../subscription_transaction_fct.xlsx \
            --source-data source_data \
            --validate-derived \
            --output validation_report_derived.csv
        continue-on-error: true

      - name: Run CDL validation (full)
        if: ${{ github.event.inputs.validation_mode == 'full' }}
        id: validation_full
        working-directory: bq_reconciliation
        run: |
          python validate_from_source.py \
            --cdl ../subscription_transaction_fct.xlsx \
            --source-data source_data \
            --validate-all \
            --output validation_report_full.csv
        continue-on-error: true

      # BigQuery Mode (replace above steps with these when using --use-bigquery)
      # - name: Run CDL validation (derived metrics) - BigQuery
      #   if: ${{ github.event.inputs.validation_mode == 'derived' || github.event.inputs.validation_mode == '' }}
      #   id: validation_derived
      #   working-directory: bq_reconciliation
      #   run: |
      #     python validate_from_source.py \
      #       --cdl ../subscription_transaction_fct.xlsx \
      #       --use-bigquery \
      #       --validate-derived \
      #       --output validation_report_derived.csv
      #   continue-on-error: true

      # - name: Run CDL validation (full) - BigQuery
      #   if: ${{ github.event.inputs.validation_mode == 'full' }}
      #   id: validation_full
      #   working-directory: bq_reconciliation
      #   run: |
      #     python validate_from_source.py \
      #       --cdl ../subscription_transaction_fct.xlsx \
      #       --use-bigquery \
      #       --validate-all \
      #       --output validation_report_full.csv
      #   continue-on-error: true

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_number }}
          path: bq_reconciliation/validation_report_*.csv
          retention-days: 90

      - name: Generate job summary
        if: always()
        run: |
          echo "# CDL Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.validation_mode || 'derived' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.validation_derived.outcome || steps.validation_full.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f bq_reconciliation/validation_report_derived.csv ]; then
            echo "## Derived Metrics Validation" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -20 bq_reconciliation/validation_report_derived.csv >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f bq_reconciliation/validation_report_full.csv ]; then
            echo "## Full Validation" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -20 bq_reconciliation/validation_report_full.csv >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      # TODO: Add notification step for failures
      # - name: Notify on failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     payload: |
      #       {
      #         "text": "CDL Validation Failed",
      #         "blocks": [
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": ":x: *CDL Validation Failed*\n\nRun: ${{ github.run_number }}\nMode: ${{ github.event.inputs.validation_mode || 'derived' }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
      #             }
      #           }
      #         ]
      #       }

      # Or create a GitHub issue on failure
      # - name: Create issue on failure
      #   if: failure()
      #   uses: actions/github-script@v7
      #   with:
      #     script: |
      #       github.rest.issues.create({
      #         owner: context.repo.owner,
      #         repo: context.repo.repo,
      #         title: `CDL Validation Failed - Run #${context.runNumber}`,
      #         body: `The CDL validation pipeline failed.\n\n**Run:** #${context.runNumber}\n**Mode:** ${{ github.event.inputs.validation_mode || 'derived' }}\n\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
      #         labels: ['validation-failure', 'automated']
      #       })

      - name: Check validation status
        if: always()
        run: |
          if [ "${{ steps.validation_derived.outcome }}" == "failure" ] || [ "${{ steps.validation_full.outcome }}" == "failure" ]; then
            echo "❌ Validation failed"
            exit 1
          else
            echo "✅ Validation passed"
          fi
